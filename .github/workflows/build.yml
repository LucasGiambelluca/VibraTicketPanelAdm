name: build-desktop

# Compila los instaladores de escritorio en runners nativos (no se puede
# buildear macOS desde Windows ni al revés), con matriz Windows + macOS.
#
# Disparo:
#  - manual:   pestaña Actions -> "build-desktop" -> Run workflow.
#  - por tag:  push de un tag `v*` (ej. v0.1.0) genera un release con binarios.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest          # Apple Silicon
            args: '--target aarch64-apple-darwin'
          # macos-13 (Intel) eliminado: GitHub retiró esos runners y el job
          # quedaba "queued" para siempre, colgando el run 24h hasta el
          # timeout (visto en v0.1.1–v0.1.5). Si hace falta un build Intel,
          # compilar en una Mac local con --target x86_64-apple-darwin.

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate app icons
        run: pnpm tauri icon src-tauri/icons/app-icon.png

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firma del updater (opcional). Si no están seteados, el updater
          # firmado se omite y se genera el instalador sin firmar.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'VibraTickets Admin ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
